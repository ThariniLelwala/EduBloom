<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Announcements - EduBloom</title>
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/topbar.css" />
    <link rel="stylesheet" href="../../css/sidebar.css" />
    <link rel="stylesheet" href="../../css/cards.css" />
    <link rel="stylesheet" href="../../css/admin/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div class="bg-image"></div>

    <div class="container">
      <div id="sidebar-container"></div>

      <main id="content">
        <div class="card-grid">
          <!-- Welcome Card -->
          <div class="card welcome full">
            <div class="welcome-content">
              <h1 class="heading">
                <i class="fas fa-bullhorn"></i> Announcements
              </h1>
              <div>Stay updated with the latest news and updates.</div>
            </div>
            <div class="welcome-image"></div>
          </div>

          <!-- Announcements List -->
          <div class="card full">
            <div class="card-header">
              <h3><i class="fas fa-bullhorn"></i> Latest Updates</h3>
            </div>
            <div id="announcements-container" class="announcements-list">
              <div class="loading-state">Loading announcements...</div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="../../js/topbar.js"></script>
    <script src="../../js/bg-manager.js"></script>
    <script>
      async function loadAnnouncements() {
        try {
          const response = await fetch("/api/announcements");
          const data = await response.json();
          const container = document.getElementById("announcements-container");

          if (!data.announcements || data.announcements.length === 0) {
            container.innerHTML = '<div class="admin-empty-state"><p>No announcements yet.</p></div>';
            return;
          }

          container.innerHTML = data.announcements.map(ann => {
            const authorName = `${ann.author_firstname || ""} ${ann.author_lastname || ""}`.trim() || ann.author_username;
            const date = new Date(ann.created_at).toLocaleDateString("en-US", {
              year: "numeric", month: "long", day: "numeric"
            });
            return `
              <div class="announcement-card">
                <div class="announcement-header">
                  <h4>${ann.title}</h4>
                  <span class="announcement-date">${date}</span>
                </div>
                <p class="announcement-message">${ann.message}</p>
                <div class="announcement-footer">
                  <span><i class="fas fa-user"></i> ${authorName}</span>
                </div>
              </div>
            `;
          }).join("");
        } catch (error) {
          document.getElementById("announcements-container").innerHTML =
            '<div class="admin-empty-state"><p>Failed to load announcements.</p></div>';
        }
      }

      document.addEventListener("DOMContentLoaded", loadAnnouncements);
    </script>
  </body>
</html>
