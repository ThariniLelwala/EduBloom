<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Help & Support - Teacher</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/topbar.css" />
    <link rel="stylesheet" href="../../css/sidebar.css" />
    <link rel="stylesheet" href="../../css/cards.css" />
    <link rel="stylesheet" href="../../css/admin/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div class="bg-image"></div>

    <div class="container">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- Main content -->
      <main id="content">
        <div class="card-grid">
          <!-- Welcome Card -->
          <div class="card welcome full">
            <div class="welcome-content">
              <h1 class="heading">
                <i class="fas fa-life-ring"></i> Help & Support
              </h1>
              <div>"Find answers to common questions and get support."</div>
            </div>
            <div class="welcome-image"></div>
          </div>

          <!-- FAQs Section -->
          <div class="card full">
            <div class="card-header">
              <h3>
                <i class="fas fa-question-circle"></i> Frequently Asked
                Questions
              </h3>
            </div>
            <div id="faqs-container" class="faqs-list">
              <!-- Populated by JavaScript -->
            </div>
          </div>

          <!-- Contact Support Section -->
          <div class="card full">
            <div class="card-header">
              <h3><i class="fas fa-envelope"></i> Contact Support</h3>
            </div>
            <div style="padding: 16px">
              <form id="support-form">
                <div style="display: flex; flex-direction: column; gap: 16px">
                  <div>
                    <label
                      style="
                        color: rgba(255, 255, 255, 0.8);
                        font-size: 12px;
                        display: block;
                        margin-bottom: 8px;
                      "
                      >Topic</label
                    >
                    <input
                      type="text"
                      id="support-topic"
                      class="admin-search-input"
                      placeholder="What do you need help with?"
                      style="width: 100%"
                      required
                    />
                  </div>
                  <div>
                    <label
                      style="
                        color: rgba(255, 255, 255, 0.8);
                        font-size: 12px;
                        display: block;
                        margin-bottom: 8px;
                      "
                      >Message</label
                    >
                    <textarea
                      id="support-message"
                      class="admin-search-input"
                      placeholder="Describe your issue or question..."
                      style="width: 100%; resize: vertical; min-height: 120px"
                      required
                    ></textarea>
                  </div>
                  <button type="submit" class="btn btn-primary">
                    <i class="fas fa-paper-plane"></i> Send Request
                  </button>
                </div>
              </form>
            </div>
          </div>

          <!-- My Help Requests Section -->
          <div class="card full">
            <div class="card-header">
              <h3><i class="fas fa-list"></i> My Help Requests</h3>
            </div>
            <div id="my-tickets-container" style="padding: 16px">
              <!-- Populated by JavaScript -->
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Help Request Modal -->
    <div id="help-request-modal" class="modal">
      <div class="modal-content" style="width: 600px; max-height: 80vh; overflow-y: auto;">
        <div class="modal-header">
          <h2 id="help-request-title">Help Request</h2>
          <span class="modal-close" data-modal="help-request-modal">&times;</span>
        </div>
        <div class="modal-body">
          <div style="display: flex; flex-direction: column; gap: 16px">
            <div>
              <label style="color: rgba(255, 255, 255, 0.6); font-size: 12px; display: block; margin-bottom: 4px;">Topic</label>
              <p id="help-request-topic" style="color: var(--color-white); margin: 0;"></p>
            </div>
            <div>
              <label style="color: rgba(255, 255, 255, 0.6); font-size: 12px; display: block; margin-bottom: 4px;">Status</label>
              <p id="help-request-status" style="color: var(--color-white); margin: 0;"></p>
            </div>
            <div>
              <label style="color: rgba(255, 255, 255, 0.6); font-size: 12px; display: block; margin-bottom: 4px;">Date</label>
              <p id="help-request-date" style="color: var(--color-white); margin: 0;"></p>
            </div>
            
            <!-- Conversation Thread -->
            <div>
              <label style="color: rgba(255, 255, 255, 0.8); font-size: 12px; display: block; margin-bottom: 8px;">Conversation</label>
              <div id="conversation-thread" style="display: flex; flex-direction: column; gap: 12px; max-height: 300px; overflow-y: auto; padding: 12px; background: rgba(255, 255, 255, 0.05); border-radius: 8px;">
                <!-- Messages will be populated here -->
              </div>
            </div>
            
            <div id="reply-section">
              <label style="color: rgba(255, 255, 255, 0.8); font-size: 12px; display: block; margin-bottom: 8px;">Your Reply</label>
              <textarea id="reply-input" class="admin-search-input" placeholder="Type your response..." style="width: 100%; resize: vertical; min-height: 100px;"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-modal="help-request-modal">Close</button>
          <button class="btn btn-primary" id="send-reply-btn">Send Reply</button>
          <button class="btn btn-primary" id="accept-resolution-btn" style="display: none;">Accept Resolution</button>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="../../js/topbar.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/bg-manager.js"></script>
    <script src="../../js/help-common.js"></script>
  </body>
</html>
